name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Publish dist branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          rm -rf /tmp/simple-auth-dist
          mkdir -p /tmp/simple-auth-dist

          cp README.md schema.sql /tmp/simple-auth-dist/
          cp -R dist /tmp/simple-auth-dist/dist

          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');
          const pkg = JSON.parse(readFileSync('package.json', 'utf8'));
          delete pkg.scripts;
          delete pkg.devDependencies;
          delete pkg.packageManager;
          writeFileSync('/tmp/simple-auth-dist/package.json', JSON.stringify(pkg, null, 2) + '\n');
          NODE

          cd /tmp/simple-auth-dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Build dist from ${GITHUB_SHA}"
          git branch -M dist
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin dist
